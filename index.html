<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro PRO | Sincronizado</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #090b11; --bg2: #12151f; --bg3: #1a1e2e;
            --border: rgba(255,255,255,0.06);
            --accent-green: #00ffa3; --accent-red: #ff4d6d;
            --accent-blue: #3b82f6; --accent-purple: #8b5cf6;
            --text: #ffffff; --text-muted: #94a3b8;
            --sidebar-width: 260px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-width); background: var(--bg2); border-right: 1px solid var(--border); position: fixed; height: 100vh; }
        .logo { padding: 30px; font-family: 'Syne'; font-weight: 800; border-bottom: 1px solid var(--border); }
        .nav-item { padding: 14px 30px; cursor: pointer; color: var(--text-muted); font-size: 13px; font-weight: 600; }
        .nav-item.active { background: rgba(139,92,246,0.1); color: #fff; border-left: 4px solid var(--accent-purple); }
        .main { flex: 1; margin-left: var(--sidebar-width); padding: 40px; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .kpi-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
        .kpi-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .kpi-value { font-family: 'Syne'; font-size: 20px; font-weight: 800; }
        .status-sync { font-size: 11px; margin-bottom: 20px; color: var(--accent-green); }
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 25px; }
        input, select { background: var(--bg3); border: 1px solid var(--border); padding: 12px; color: #fff; border-radius: 10px; width: 100%; margin-bottom: 15px; }
        .btn { padding: 15px; border: none; border-radius: 10px; background: var(--accent-purple); color: #fff; font-weight: 800; cursor: pointer; width: 100%; }
        .item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 800; margin-left: 5px; }
        .tag-eu { background: rgba(59,130,246,0.2); color: var(--accent-blue); }
        .tag-ela { background: rgba(139,92,246,0.2); color: var(--accent-purple); }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">FINANCEIRO PRO</div>
    <nav>
        <div class="nav-item active" onclick="showView('dashboard', this)">📊 Dashboard</div>
        <div class="nav-item" onclick="showView('lancamentos', this)">↕️ Lançamentos</div>
    </nav>
</aside>

<main class="main">
    <div id="status" class="status-sync">● Sincronizado com a nuvem</div>

    <section id="dashboard" class="view-section active">
        <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-label">Minhas Contas</div><div id="d-eu" class="kpi-value">R$ 0</div></div>
            <div class="kpi-card"><div class="kpi-label">Contas Esposa</div><div id="d-ela" class="kpi-value">R$ 0</div></div>
            <div class="kpi-card"><div class="kpi-label">Total do Mês</div><div id="d-total" class="kpi-value">R$ 0</div></div>
            <div class="kpi-card"><div class="kpi-label">Investimentos</div><div id="d-inv" class="kpi-value">R$ 0</div></div>
        </div>
        <div class="card">
            <h3 style="margin-bottom:15px">Últimas Movimentações</h3>
            <div id="lista-transacoes"></div>
        </div>
    </section>

    <section id="lancamentos" class="view-section">
        <div class="card">
            <h3>Novo Lançamento</h3>
            <select id="l-user"><option value="Eu">Eu (Adriano)</option><option value="Esposa">Esposa</option></select>
            <input type="text" id="l-desc" placeholder="Descrição (ex: Mercado, Aluguel)">
            <input type="number" id="l-valor" placeholder="Valor R$">
            <button class="btn" onclick="addLan()">Salvar na Nuvem</button>
        </div>
    </section>
</main>

<script>
    // DADOS DA SUA CONTA JSONBIN
    const API_KEY = '$2a$10$O9fA6YQy8oYqWp5WnZ.uHeP19mKj57.Hh.Fh8kG.fO.mH.y.l.q.a'; // Cole sua Master Key aqui
    const BIN_ID = '69e9214d856a682189607a23'; // Seu ID de coleção

    let db = { lan: [], metas: [], inv: [], fgts: 0 };

    async function loadCloud() {
        document.getElementById('status').innerText = '⏳ Puxando dados da nuvem...';
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await res.json();
            db = data.record;
            updateUI();
            document.getElementById('status').innerText = '● Atualizado em tempo real';
        } catch (e) { document.getElementById('status').innerText = '❌ Erro de conexão'; }
    }

    async function saveCloud() {
        document.getElementById('status').innerText = '📤 Enviando para o celular dela...';
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
            body: JSON.stringify(db)
        });
        document.getElementById('status').innerText = '● Sincronizado!';
        updateUI();
    }

    function addLan() {
        const desc = document.getElementById('l-desc').value;
        const valor = parseFloat(document.getElementById('l-valor').value);
        if(!desc || !valor) return alert("Preencha tudo!");

        db.lan.push({
            user: document.getElementById('l-user').value,
            desc: desc,
            valor: valor,
            data: new Date().toLocaleDateString('pt-BR')
        });
        saveCloud();
    }

    function updateUI() {
        const eu = db.lan.filter(x => x.user === 'Eu').reduce((a,b)=>a+b.valor, 0);
        const ela = db.lan.filter(x => x.user === 'Esposa').reduce((a,b)=>a+b.valor, 0);
        
        document.getElementById('d-eu').innerText = `R$ ${eu.toLocaleString()}`;
        document.getElementById('d-ela').innerText = `R$ ${ela.toLocaleString()}`;
        document.getElementById('d-total').innerText = `R$ ${(eu+ela).toLocaleString()}`;
        
        const lista = document.getElementById('lista-transacoes');
        lista.innerHTML = '';
        db.lan.slice(-10).reverse().forEach(t => {
            lista.innerHTML += `
                <div class="item-row">
                    <span>${t.data} - ${t.desc} <span class="tag ${t.user==='Eu'?'tag-eu':'tag-ela'}">${t.user}</span></span>
                    <b>R$ ${t.valor.toLocaleString()}</b>
                </div>`;
        });
    }

    function showView(id, el) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        loadCloud();
    }

    loadCloud(); // Carrega ao abrir
</script>
</body>
</html>
